name: OTF Testing
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Functional Test on ${{ matrix.browser }}
    permissions: write-all
    runs-on: ubuntu-latest
    
    # --- STRATEGI MATRIX UNTUK PARALLEL TESTING ---
    strategy:
      matrix:
        browser: [firefox, chrome, edge]
    # ----------------------------------------------

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Create isolated network
        run: docker network create --driver bridge isolated

      - name: Deploy AUT
        run: docker build -t my-php-site:latest .

      - name: Run AUT
        run: docker run --network=isolated -p 80:80 --name docker-apache -t -d my-php-site:latest

      - name: Get AUT URL
        run: |
          URL=http://$(ip -f inet -o addr show docker0 | awk '{print $4}' | cut -d '/' -f 1)
          echo "URL=$URL" >> $GITHUB_ENV

      - name: Check AUT Url
        run: curl ${{ env.URL }}

      # Mengaktifkan container standalone sesuai browser pada matrix
      - name: Selenium Preparation
        run: |
          docker run --network=isolated -d -p 4444:4444 -p 7900:7900 -v /dev/shm:/dev/shm --name selenium-standalone selenium/standalone-${{ matrix.browser }}:latest

      - name: Wait for Selenium Hub
        run: sh wait.sh

      - name: Check the Hub
        run: curl http://localhost:4444/ui

      - name: Install Selenium client
        run: pip install -U selenium

      # Mengirimkan tipe browser ke skrip Python
      - name: Run test
        env:
          BROWSER_TYPE: ${{ matrix.browser }}
        run: python tests/hello_aut.py ${{ env.URL }}

      # Mengunggah bukti screenshot unik dari masing-masing browser
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.browser }}
          path: tests/screenshot_${{ matrix.browser }}.png

      - name: stop docker
        run: docker stop docker-apache